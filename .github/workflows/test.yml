name: tests

# Run the backend characterization tests on every push to main and on
# every PR targeting main. A failed test fails the job, which (with
# branch protection enabled on main) blocks merges until the regression
# is fixed — that's what turns the test suite from "a thing on disk"
# into a real regression net.

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel an in-progress run when a newer commit lands on the same
# branch / PR — saves runner minutes and avoids stale "still running"
# checks on the previous commit.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pytest:
    name: pytest (backend)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    steps:
      - name: Check out repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
          cache-dependency-path: backend/pyproject.toml

      - name: Install backend with dev deps
        run: pip install -e ".[dev]"

      - name: Run pytest
        run: pytest -v
