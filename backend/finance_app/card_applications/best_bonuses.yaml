# Best current credit-card welcome bonuses.
#
# Curated by hand. The Card applications panel reads this and surfaces
# the top N in a "consider applying for" sidebar. Update when the
# bonuses move — it's just a YAML file.
#
# Fields per entry:
#   card_name            display name on the card
#   issuer               Chase / American Express / Capital One / etc.
#   bonus_points         signup bonus in points / miles
#   bonus_dollar_value   estimated cash-equivalent value in cents
#   minimum_spend_cents  spend required to earn the bonus
#   minimum_spend_months months allowed to hit the spend
#   annual_fee_cents     first-year fee (waived where applicable)
#   counts_toward_5_24   whether opening this card adds to the Chase 5/24 count
#   chase_5_24_friendly  whether you'd be approved at <5/24 (Chase consumer cards: yes; most others: irrelevant)
#   notes                short context — best use case, lifetime restrictions, etc.
#   product_url          issuer's apply page (nofollow on the UI side)
#
# Updated: 2026-05-04. Each bonus is the "regularly available" one,
# not a chase-the-elevated SignUpBonus tracker number — those move daily.

- card_name: Chase Sapphire Preferred
  issuer: Chase
  bonus_points: 75000
  bonus_dollar_value: 150000  # $1,500 via Chase Travel
  minimum_spend_cents: 400000
  minimum_spend_months: 3
  annual_fee_cents: 9500
  counts_toward_5_24: true
  chase_5_24_friendly: true
  notes: 60-100K is the floor; 100K elevated comes around once or twice a year. 10% anniversary points + $50 hotel credit.
  product_url: https://www.chase.com/personal/credit-cards/sapphire-preferred

