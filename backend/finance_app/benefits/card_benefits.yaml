# Card-benefit profiles for the "use it or lose it" tracker.
#
# Schema per card:
#   name              : display name (must match a card in card_rewards.yaml
#                       so the benefits show on the same card surface).
#   name_patterns     : substrings on Account.name to match.
#   annual_fee_cents  : the headline annual fee (post-first-year if waived).
#   benefits          : list of benefit entries.
#
# Each benefit:
#   name              : human label
#   value_cents       : annual face value when fully used. null = "valuable
#                       but $-amount varies" (e.g. trip cancellation insurance).
#   reset             : "calendar_year" | "cardholder_year" | "monthly" |
#                       "per_trip" | "lifetime" | "perpetual"
#   how_to_use        : one-sentence instruction
#   typical_redemption: where most people redeem (e.g. "Amex Travel portal")
#
# When tracking, we treat benefits with non-null value_cents as countable:
# their use-rate vs. annual cap drives the dashboard ROI math.

- name: "Chase Sapphire Reserve"
  name_patterns: ["sapphire reserve", "csr"]
  annual_fee_cents: 55000  # $550
  benefits:
    - name: "$300 annual travel credit"
      value_cents: 30000
      reset: cardholder_year
      how_to_use: "Auto-applies to first $300 of travel each cardholder year."
      typical_redemption: "Any 'travel' merchant — flights, hotels, rideshare, transit, parking."
    - name: "Priority Pass Select lounge access"
      value_cents: 46900
      reset: lifetime
      how_to_use: "Free $469/yr Priority Pass Select membership. Enroll once after card opening."
      typical_redemption: "Airport lounges worldwide; PP app shows participating lounges."
    - name: "TSA PreCheck / Global Entry credit"
      value_cents: 10000
      reset: every_4_years
      how_to_use: "Apply for Global Entry ($100); pay with the card; statement credit auto-issues."
      typical_redemption: "Apply at ttp.cbp.dhs.gov."
    - name: "Trip cancellation/interruption insurance"
      value_cents: null
      reset: per_trip
      how_to_use: "Pay full trip with card; up to $10k/person, $20k/trip reimbursed for covered cancellations."
      typical_redemption: "File via Chase Visa Benefits portal."
    - name: "Primary auto-rental CDW"
      value_cents: null
      reset: per_trip
      how_to_use: "Decline the rental company's CDW; pay rental with card."
      typical_redemption: "Up to $75k cap on damage/theft."
    - name: "Doordash DashPass + monthly DD credit"
      value_cents: 12000
      reset: monthly
      how_to_use: "Activate DashPass; $5/mo Doordash credit + $20/mo non-restaurant DashMart credit."
      typical_redemption: "Doordash app — credits auto-apply at checkout."

