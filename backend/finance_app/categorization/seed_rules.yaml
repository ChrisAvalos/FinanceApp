# ============================================================================
# Phase 2 polish expansion (2026-04-27): bulk-add national chains + common
# Plaid-formatted merchant strings to lift the categorization hit rate on
# real production data. Bias toward high-volume merchants you'd see in any
# US bank statement; long-tail / hyperlocal merchants stay user-defined.
#
# Pattern guidance:
#   - Plain string = case-insensitive substring match. Default for chain names.
#   - is_regex: true = full Python regex. Use when a chain has a common-word
#     name that needs anchoring (e.g. "TARGET" alone is fine substring; "GAP"
#     would be too short — needs ^GAP\b style).
#   - priority 220+ = strong/specific (Netflix, Apple Store).
#   - priority 180-200 = standard chain matches (most rules below).
#   - priority 130-160 = very generic regex catch-alls (BAKERY, RESTAURANT,
#     ELECTRIC). They should always be lower than specific rules so a
#     "WALGREENS PHARMACY" hits Walgreens, not "Generic pharmacy".
# ============================================================================

